services:
  mission-control:
    build: .
    container_name: openclaw-mission-control
    ports:
      - "${MC_PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host-gateway:host-gateway"
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - mc-net
    restart: unless-stopped

networks:
  mc-net:
    driver: bridge
